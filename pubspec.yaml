name: georide
description: "Pokemon GO inspired real-time GPS ride-sharing app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  maplibre_gl: 0.25.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/style.json
